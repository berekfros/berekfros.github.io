<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Petelot Coding</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="starlink-header">
        <div class="header-container">
            <div class="logo">
                <h1>PETELOT</h1>
            </div>
            
            <nav class="main-nav">
                <a href="index.html">HOME</a>
                <a href="#website">WEBSITE</a>
                <a href="#discord">DISCORD BOT</a>
                <a href="#roblox">ROBLOX SCRIPT</a>
            </nav>

            <div class="nav-right">
                <a href="/order" class="btn-primary">MULAI SEKARANG</a>
                <button class="mobile-menu"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="portfolio-main">
        <section id="website" class="portfolio-section">
            <div class="container-full portfolio-item">
                <div class="portfolio-info">
                    </div>
                
                <div class="portfolio-media">
                    <div class="media-box img-box zoomable-image">
                        <img src="images/html.png" alt="Website Preview">
                        <div class="zoom-overlay">
                            <i class="fa-solid fa-magnifying-glass-plus"></i>
                        </div>
                    </div>
                    
                    <div class="media-box video-box">
                        <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </section>
        
        </main>

    <script>
        // 1. Logika Zoom Foto saat Diklik
        const zoomableImages = document.querySelectorAll('.zoomable-image');

        zoomableImages.forEach(imageWrapper => {
            imageWrapper.addEventListener('click', function() {
                // Toggle class 'zoomed' pada container gambar
                this.classList.toggle('zoomed');
                
                // Toggle icon zoom in/out
                const icon = this.querySelector('.zoom-overlay i');
                if (this.classList.contains('zoomed')) {
                    icon.classList.remove('fa-magnifying-glass-plus');
                    icon.classList.add('fa-magnifying-glass-minus');
                } else {
                    icon.classList.remove('fa-magnifying-glass-minus');
                    icon.classList.add('fa-magnifying-glass-plus');
                }
            });
        });

        // 2. Logika Navbar Solid saat Scroll (Opsional jika ingin transparan di atas)
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.starlink-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
