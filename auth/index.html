<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petelot Auth - Full Background Rain</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="container login-mode" id="mainContainer">
        <div class="form-panel">
            <div class="gradient-edge"></div>
            
            <div class="form-wrapper">
                <div id="loginArea">
                    <h1>WELCOME BACK</h1>
                    <p class="subtitle">Otomasi bisnis Anda dengan kode profesional.</p>
                    <form id="loginForm">
                        <input type="email" placeholder="Email Address" required>
                        <input type="password" placeholder="Password" required>
                        <button type="submit" class="btn-auth">SIGN IN NOW</button>
                    </form>
                    <p class="switch-text">Belum punya akun? <a href="javascript:void(0)" onclick="switchMode()">Register di sini</a></p>
                </div>

                <div id="registerArea" style="display: none;">
                    <h1>JOIN PETELOT</h1>
                    <p class="subtitle">Mulai bangun infrastruktur digital Anda sekarang.</p>
                    <form id="registerForm">
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Email Address" required>
                        <input type="password" placeholder="Create Password" required>
                        <button type="submit" class="btn-auth">CREATE ACCOUNT</button>
                    </form>
                    <p class="switch-text">Sudah punya akun? <a href="javascript:void(0)" onclick="switchMode()">Login di sini</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
